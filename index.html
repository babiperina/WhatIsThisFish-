<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Is My Fish?</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0a1628 0%, #0d3b6e 30%, #0e6b8a 60%, #1a9fba 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated bubbles */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.05) 2px, transparent 2px),
                radial-gradient(circle, rgba(255,255,255,0.06) 1.5px, transparent 1.5px);
            background-size: 120px 200px, 80px 160px, 200px 300px;
            background-position: 10px 20px, 50px 80px, 90px 140px;
            animation: bubbles 8s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bubbles {
            0%   { background-position: 10px 120vh, 50px 120vh, 90px 120vh; }
            100% { background-position: 10px -200px, 50px -200px, 90px -200px; }
        }

        /* Wave at the bottom */
        .waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 0;
            overflow: hidden;
        }

        .waves svg {
            width: 200%;
            animation: wave 6s linear infinite;
        }

        @keyframes wave {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px 120px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 12vw, 8rem);
            color: #ffffff;
            text-align: center;
            line-height: 0.95;
            letter-spacing: 4px;
            text-shadow:
                0 0 40px rgba(30, 200, 255, 0.6),
                0 4px 24px rgba(0, 0, 0, 0.5);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(180, 230, 255, 0.75);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        button {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 16px 48px;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 114, 255, 0.4), 0 0 0 1px rgba(255,255,255,0.1);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            margin-bottom: 40px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 114, 255, 0.6), 0 0 0 1px rgba(255,255,255,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .webcam-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        #webcam-container {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.12), 0 16px 48px rgba(0,0,0,0.4);
        }

        #switch-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: none;
            margin-bottom: 0;
            display: none;
        }

        #switch-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: none;
            box-shadow: none;
        }

        #webcam-container canvas,
        #webcam-container video {
            display: block;
            border-radius: 16px;
        }

        #label-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .best-match {
            background: linear-gradient(135deg, rgba(0, 198, 255, 0.2), rgba(0, 114, 255, 0.2));
            border: 1px solid rgba(0, 198, 255, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 8px;
        }

        .best-match-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0, 198, 255, 0.8);
            margin-bottom: 8px;
        }

        .best-match-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 0 0 24px rgba(0, 198, 255, 0.5);
            line-height: 1;
            margin-bottom: 6px;
        }

        .best-match-pct {
            font-size: 1.4rem;
            font-weight: 600;
            color: rgba(100, 220, 255, 0.9);
        }

        .bar-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bar-name {
            font-size: 0.85rem;
            color: rgba(200, 235, 255, 0.85);
            font-weight: 600;
            width: 130px;
            flex-shrink: 0;
            text-align: right;
        }

        .bar-track {
            flex: 1;
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            transition: width 0.2s ease;
            min-width: 2px;
        }

        .bar-pct {
            font-size: 0.8rem;
            color: rgba(180, 220, 255, 0.7);
            width: 38px;
            flex-shrink: 0;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>WHAT IS<br>MY FISH?</h1>
        <p class="subtitle">Point your camera at a fish</p>
        <button type="button" onclick="init()">Start Camera</button>
        <div class="webcam-wrapper">
            <div id="webcam-container"></div>
            <button id="switch-btn" onclick="switchCamera()">&#x21BA; Flip Camera</button>
        </div>
        <div id="label-container">
            <div class="best-match" id="best-match" style="display:none">
                <div class="best-match-label">Best match</div>
                <div class="best-match-name" id="best-name">—</div>
                <div class="best-match-pct" id="best-pct">—</div>
            </div>
            <div class="bar-row" id="bar-row"></div>
        </div>
    </div>

    <div class="waves">
        <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,40 C180,80 360,0 540,40 C720,80 900,0 1080,40 C1260,80 1440,0 1440,40 L1440,80 L0,80 Z" fill="rgba(255,255,255,0.05)"/>
            <path d="M0,55 C180,20 360,70 540,50 C720,30 900,70 1080,50 C1260,30 1440,60 1440,55 L1440,80 L0,80 Z" fill="rgba(255,255,255,0.04)"/>
        </svg>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = 'https://teachablemachine.withgoogle.com/models/fBz1q_mLZf/';

        let model, webcam, maxPredictions;
        let facingMode = 'environment';

        let isIos = false;
        if (window.navigator.userAgent.indexOf('iPhone') > -1 || window.navigator.userAgent.indexOf('iPad') > -1) {
            isIos = true;
        }

        async function init() {
            const modelURL = URL + 'model.json';
            const metadataURL = URL + 'metadata.json';

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const width = 300;
            const height = 300;
            webcam = new tmImage.Webcam(width, height, false);
            await webcam.setup();

            if (isIos) {
                document.getElementById('webcam-container').appendChild(webcam.webcam);
                const webCamVideo = document.getElementsByTagName('video')[0];
                webCamVideo.setAttribute("playsinline", true);
                webCamVideo.muted = "true";
                webCamVideo.style.width = width + 'px';
                webCamVideo.style.height = height + 'px';
            } else {
                document.getElementById("webcam-container").appendChild(webcam.canvas);
            }

            const barRow = document.getElementById('bar-row');
            for (let i = 0; i < maxPredictions; i++) {
                const item = document.createElement('div');
                item.className = 'bar-item';
                item.innerHTML = `
                    <span class="bar-name"></span>
                    <div class="bar-track"><div class="bar-fill" style="width:0%"></div></div>
                    <span class="bar-pct">0%</span>`;
                barRow.appendChild(item);
            }

            document.getElementById('switch-btn').style.display = 'block';
            webcam.play();
            window.requestAnimationFrame(loop);
        }

        async function switchCamera() {
            const next = facingMode === 'environment' ? 'user' : 'environment';
            const video = webcam.webcam;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: next }, width: 300, height: 300 }
                });

                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(t => t.stop());
                }

                facingMode = next;
                video.srcObject = stream;
                webcam.flip = facingMode === 'user';
                await video.play();
            } catch (e) {
                console.error('Camera switch failed:', e);
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            let prediction;
            if (isIos) {
                prediction = await model.predict(webcam.webcam);
            } else {
                prediction = await model.predict(webcam.canvas);
            }

            const sorted = [...prediction].sort((a, b) => b.probability - a.probability);
            const best = sorted[0];

            document.getElementById('best-match').style.display = 'block';
            document.getElementById('best-name').textContent = best.className;
            document.getElementById('best-pct').textContent = (best.probability * 100).toFixed(1) + '%';

            const barItems = document.getElementById('bar-row').querySelectorAll('.bar-item');
            sorted.forEach((p, i) => {
                const pct = (p.probability * 100).toFixed(1);
                barItems[i].querySelector('.bar-name').textContent = p.className;
                barItems[i].querySelector('.bar-fill').style.width = pct + '%';
                barItems[i].querySelector('.bar-pct').textContent = pct + '%';
            });
        }
    </script>

</body>
</html>
